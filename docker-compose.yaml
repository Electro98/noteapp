services:
  postgres_db:
    image: postgres:latest
    environment:
      POSTGRES_HOST: "0.0.0.0"
      POSTGRES_PORT: 5432
      POSTGRES_DB: "noteapp_golang"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
    ports:
      - "5432:5432"
    restart: always
  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres_db
    links:
      - postgres_db
    volumes:
      - ./.config.toml:/.config.toml
    restart: always